<style>
  :root {
    --bg:#021843;--surface:#03215b;--surface2:#042d7a;--border:#0a3a8f;
    --accent:#f2bb16;--accent2:#e0a800;--accent3:#ffd14d;
    --text:#ffffff;--muted:#a0b4d6;
    --success:#4ade80;--warning:#f2bb16;--danger:#f87171;
    --radius:14px;--radius-sm:8px;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;}
  body::before{content:'';position:fixed;top:-200px;left:-200px;width:600px;height:600px;background:radial-gradient(circle,rgba(242,187,22,0.07) 0%,transparent 70%);pointer-events:none;z-index:0;}
  body::after{content:'';position:fixed;bottom:-200px;right:-200px;width:500px;height:500px;background:radial-gradient(circle,rgba(242,187,22,0.04) 0%,transparent 70%);pointer-events:none;z-index:0;}

  /* TYPOGRAPHY */
  h1,h2,.logo,.topbar-logo,.section-title,.card-title,.modal-title,.stat-value,.kahoot-score-big,.final-score-display .value,.btn{font-family:'League Spartan',sans-serif;text-transform:uppercase;letter-spacing:0.5px;}

  .screen{display:none;position:relative;z-index:1;}
  .screen.active{display:block;}

  /* LOGIN */
  #loginScreen{min-height:100vh;display:none;align-items:center;justify-content:center;}
  #loginScreen.active{display:flex;}
  .login-box{background:var(--surface);border:1px solid var(--border);border-radius:24px;padding:48px 44px;width:100%;max-width:420px;position:relative;overflow:hidden;}
  .login-box::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,#f2bb16,#ffd14d,#e0a800);}
  .logo{font-size:32px;font-weight:900;letter-spacing:2px;margin-bottom:8px;color:#fff;}
  .logo span{color:var(--accent);}
  .login-subtitle{color:var(--muted);font-size:14px;margin-bottom:36px;font-family:'DM Sans',sans-serif;text-transform:none;letter-spacing:0;}
  .tab-bar{display:flex;gap:4px;background:var(--surface2);border-radius:var(--radius-sm);padding:4px;margin-bottom:28px;}
  .tab-btn{flex:1;padding:8px;border:none;background:transparent;color:var(--muted);font-family:'League Spartan',sans-serif;font-size:13px;font-weight:600;text-transform:uppercase;letter-spacing:0.5px;border-radius:6px;cursor:pointer;transition:all 0.2s;}
  .tab-btn.active{background:var(--accent);color:#03215b;}
  .form-group{margin-bottom:16px;}
  .form-label{display:block;font-size:11px;color:var(--muted);margin-bottom:6px;letter-spacing:1px;text-transform:uppercase;font-family:'League Spartan',sans-serif;}
  .form-input{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:12px 16px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:15px;outline:none;transition:border-color 0.2s;}
  .form-input:focus{border-color:var(--accent);}
  select.form-input{cursor:pointer;}
  .btn{width:100%;padding:13px;border:none;border-radius:var(--radius-sm);font-size:14px;font-weight:700;cursor:pointer;transition:all 0.2s;}
  .btn-primary{background:var(--accent);color:#03215b;margin-top:8px;}
  .btn-primary:hover:not(:disabled){background:#ffd14d;transform:translateY(-1px);}
  .btn-primary:disabled{opacity:0.6;cursor:not-allowed;}
  .btn-secondary{background:var(--surface2);color:var(--text);border:1px solid var(--border);margin-top:0;}
  .btn-secondary:hover{border-color:var(--accent);color:var(--accent);}
  .btn-sm{width:auto;padding:8px 16px;font-size:12px;}
  .error-msg{color:var(--danger);font-size:13px;margin-top:12px;text-align:center;min-height:18px;font-family:'DM Sans',sans-serif;}

  /* APP */
  .topbar{display:flex;align-items:center;justify-content:space-between;padding:16px 32px;background:var(--surface);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100;}
  .topbar-logo{font-size:22px;font-weight:900;letter-spacing:2px;color:#fff;}
  .topbar-logo span{color:var(--accent);}
  .topbar-right{display:flex;align-items:center;gap:16px;}
  .user-chip{display:flex;align-items:center;gap:10px;background:var(--surface2);border:1px solid var(--border);border-radius:50px;padding:6px 16px 6px 6px;}
  .user-avatar-sm{width:32px;height:32px;border-radius:50%;font-size:18px;display:flex;align-items:center;justify-content:center;background:var(--surface);border:1px solid var(--border);}
  .user-name-sm{font-size:13px;font-weight:500;font-family:'DM Sans',sans-serif;}
  .logout-btn{background:none;border:1px solid var(--border);color:var(--muted);padding:6px 12px;border-radius:6px;cursor:pointer;font-size:12px;transition:all 0.2s;font-family:'DM Sans',sans-serif;}
  .logout-btn:hover{border-color:var(--danger);color:var(--danger);}
  .main-content{padding:32px;max-width:1000px;margin:0 auto;}

  /* CARDS */
  .card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:28px;margin-bottom:24px;}
  .card-title{font-size:16px;font-weight:700;margin-bottom:6px;}
  .card-subtitle{color:var(--muted);font-size:13px;margin-bottom:20px;font-family:'DM Sans',sans-serif;text-transform:none;letter-spacing:0;}

  /* STUDENT HERO */
  .student-hero{background:linear-gradient(135deg,rgba(3,33,91,0.9),rgba(242,187,22,0.1));border:1px solid rgba(242,187,22,0.25);border-radius:var(--radius);padding:32px 36px;display:flex;align-items:center;gap:28px;margin-bottom:24px;position:relative;overflow:hidden;}
  .student-hero::after{content:'🎯';position:absolute;right:36px;top:50%;transform:translateY(-50%);font-size:72px;opacity:0.12;}
  .student-avatar-big{width:84px;height:84px;border-radius:50%;font-size:46px;display:flex;align-items:center;justify-content:center;background:var(--surface);border:2px solid var(--accent);cursor:pointer;transition:transform 0.2s;position:relative;flex-shrink:0;}
  .student-avatar-big:hover{transform:scale(1.06);}
  .avatar-edit-hint{position:absolute;bottom:0;right:0;background:var(--accent);border-radius:50%;width:22px;height:22px;font-size:11px;display:flex;align-items:center;justify-content:center;}
  .student-info h2{font-family:'League Spartan',sans-serif;font-size:26px;font-weight:800;text-transform:uppercase;letter-spacing:1px;margin-bottom:6px;}
  .student-info p{color:var(--muted);font-size:14px;font-family:'DM Sans',sans-serif;}
  .nivel-badge{display:inline-block;background:rgba(242,187,22,0.15);border:1px solid rgba(242,187,22,0.35);color:var(--accent);border-radius:20px;padding:3px 12px;font-size:12px;font-weight:700;font-family:'League Spartan',sans-serif;text-transform:uppercase;letter-spacing:0.5px;margin-top:6px;}

  /* FINAL SCORE */
  .final-score-display{background:linear-gradient(135deg,rgba(242,187,22,0.1),rgba(3,33,91,0.6));border:1px solid rgba(242,187,22,0.3);border-radius:var(--radius);padding:32px;text-align:center;margin-bottom:24px;}
  .final-score-display .label{font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:8px;font-family:'League Spartan',sans-serif;}
  .final-score-display .value{font-size:72px;font-weight:900;color:var(--accent);line-height:1;}
  .final-score-display .sub{font-size:16px;color:var(--text);margin-top:10px;font-family:'DM Sans',sans-serif;font-weight:500;}

  /* KAHOOT CARDS */
  .kahoot-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-bottom:24px;}
  @media(max-width:600px){.kahoot-grid{grid-template-columns:1fr;}}
  .kahoot-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:24px;text-align:center;position:relative;overflow:hidden;}
  .kahoot-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;}
  .kahoot-card.k1::before{background:linear-gradient(90deg,#f2bb16,#ffd14d);}
  .kahoot-card.k2::before{background:linear-gradient(90deg,#e0a800,#f2bb16);}
  .kahoot-card.k3::before{background:linear-gradient(90deg,#ffd14d,#ffe480);}
  .kahoot-label{font-size:10px;text-transform:uppercase;letter-spacing:1.5px;color:var(--muted);margin-bottom:12px;font-family:'League Spartan',sans-serif;}
  .kahoot-score-big{font-size:52px;font-weight:900;line-height:1;margin-bottom:6px;color:var(--accent);}
  .kahoot-sub{font-size:12px;color:var(--muted);font-family:'DM Sans',sans-serif;}
  .no-data-big{color:var(--border);font-size:36px;font-weight:700;font-family:'League Spartan',sans-serif;}

  /* PROGRESS */
  .progress-bar-wrap{background:var(--surface2);border-radius:4px;height:8px;overflow:hidden;flex:1;}
  .progress-bar{height:100%;border-radius:4px;transition:width 1s cubic-bezier(.4,0,.2,1);}
  .progress-bar.k1{background:linear-gradient(90deg,#f2bb16,#ffd14d);}
  .progress-bar.k2{background:linear-gradient(90deg,#e0a800,#f2bb16);}
  .progress-bar.k3{background:linear-gradient(90deg,#ffd14d,#ffe480);}
  .progress-bar.total{background:linear-gradient(90deg,#f2bb16,#e0a800);}
  .bar-row{display:flex;align-items:center;gap:12px;font-size:13px;margin-bottom:14px;}
  .bar-label{width:80px;font-size:12px;font-weight:600;color:var(--muted);font-family:'League Spartan',sans-serif;text-transform:uppercase;}
  .bar-val{width:52px;text-align:right;font-size:13px;font-weight:700;}

  /* PILLS */
  .pill{display:inline-block;padding:3px 10px;border-radius:20px;font-size:12px;font-weight:600;font-family:'DM Sans',sans-serif;}
  .pill-high{background:rgba(74,222,128,0.15);color:var(--success);}
  .pill-mid{background:rgba(242,187,22,0.15);color:var(--warning);}
  .pill-low{background:rgba(248,113,113,0.15);color:var(--danger);}
  .pill-none{background:rgba(160,180,214,0.15);color:var(--muted);}

  /* TEACHER TABS */
  .app-tabs{display:flex;gap:4px;margin-bottom:28px;border-bottom:1px solid var(--border);overflow-x:auto;}
  .app-tab{padding:10px 20px;border:none;background:none;color:var(--muted);font-family:'League Spartan',sans-serif;font-size:13px;font-weight:600;text-transform:uppercase;letter-spacing:0.5px;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;transition:all 0.2s;white-space:nowrap;}
  .app-tab.active{color:var(--accent);border-bottom-color:var(--accent);}
  .section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;}
  .section-title{font-size:22px;font-weight:800;}
  .section-subtitle{color:var(--muted);font-size:13px;margin-top:2px;font-family:'DM Sans',sans-serif;text-transform:none;letter-spacing:0;}
  .two-col{display:grid;grid-template-columns:1fr 1fr;gap:24px;}
  @media(max-width:768px){.two-col{grid-template-columns:1fr;}}
  .form-row{display:flex;gap:12px;}
  .form-row .form-group{flex:1;}

  /* TABLE */
  .table-wrap{overflow-x:auto;}
  table{width:100%;border-collapse:collapse;font-size:14px;}
  th{text-align:left;color:var(--muted);font-size:10px;text-transform:uppercase;letter-spacing:1px;padding:10px 14px;border-bottom:1px solid var(--border);font-weight:600;font-family:'League Spartan',sans-serif;}
  td{padding:11px 14px;border-bottom:1px solid rgba(255,255,255,0.04);font-family:'DM Sans',sans-serif;}
  tr:last-child td{border-bottom:none;}
  tr:hover td{background:rgba(255,255,255,0.02);}

  .student-row{display:flex;align-items:center;justify-content:space-between;padding:11px 0;border-bottom:1px solid rgba(255,255,255,0.04);}
  .student-row:last-child{border-bottom:none;}
  .student-row-left{display:flex;align-items:center;gap:12px;}
  .ava-xs{width:36px;height:36px;border-radius:50%;font-size:20px;display:flex;align-items:center;justify-content:center;background:var(--surface2);border:1px solid var(--border);}

  .empty-state{text-align:center;padding:48px;color:var(--muted);font-family:'DM Sans',sans-serif;}
  .empty-icon{font-size:48px;margin-bottom:12px;}

  /* UPLOAD */
  .upload-zone{border:2px dashed var(--border);border-radius:var(--radius);padding:32px;text-align:center;cursor:pointer;transition:all 0.2s;background:var(--surface2);}
  .upload-zone:hover,.upload-zone.over{border-color:var(--accent);background:rgba(242,187,22,0.05);}
  .upload-icon{font-size:36px;margin-bottom:10px;}
  .upload-text{color:var(--muted);font-size:14px;font-family:'DM Sans',sans-serif;}
  .upload-text strong{color:var(--text);}
  #fileInput{display:none;}

  /* MODAL */
  .modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.75);z-index:200;align-items:center;justify-content:center;}
  .modal-overlay.open{display:flex;}
  .modal{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:32px;max-width:480px;width:90%;}
  .modal-title{font-size:18px;font-weight:700;margin-bottom:20px;}
  .emoji-grid{display:grid;grid-template-columns:repeat(8,1fr);gap:8px;margin-bottom:24px;}
  .emoji-btn{width:44px;height:44px;border-radius:10px;border:2px solid transparent;background:var(--surface2);font-size:22px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.15s;}
  .emoji-btn:hover{border-color:var(--accent);transform:scale(1.1);}
  .emoji-btn.selected{border-color:var(--accent);background:rgba(242,187,22,0.15);}

  /* TOAST */
  #toast{position:fixed;bottom:32px;left:50%;transform:translateX(-50%) translateY(100px);background:var(--success);color:#000;padding:12px 24px;border-radius:50px;font-weight:600;font-size:14px;z-index:999;transition:transform 0.3s;font-family:'DM Sans',sans-serif;}
  #toast.show{transform:translateX(-50%) translateY(0);}
  #toast.err{background:var(--danger);color:#fff;}

  .spinner{display:inline-block;width:16px;height:16px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 0.7s linear infinite;vertical-align:middle;margin-right:6px;}
  @keyframes spin{to{transform:rotate(360deg);}}

  .info-box{border:1px solid rgba(242,187,22,0.3);background:rgba(242,187,22,0.05);border-radius:var(--radius);padding:18px 22px;color:var(--accent);font-size:14px;margin-bottom:20px;line-height:1.6;font-family:'DM Sans',sans-serif;}
  .warn-box{border:1px solid rgba(248,113,113,0.3);background:rgba(248,113,113,0.05);border-radius:var(--radius);padding:18px 22px;color:var(--danger);font-size:14px;margin-bottom:16px;font-family:'DM Sans',sans-serif;}
  .data-badge{display:inline-flex;align-items:center;gap:6px;background:rgba(242,187,22,0.1);border:1px solid rgba(242,187,22,0.3);color:var(--accent);border-radius:20px;padding:4px 12px;font-size:12px;font-weight:600;font-family:'League Spartan',sans-serif;}
  .code-chip{display:inline-block;background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:3px 10px;font-size:13px;font-weight:700;letter-spacing:1px;font-family:'League Spartan',sans-serif;color:var(--accent);}
  .nivel-group-header{font-family:'League Spartan',sans-serif;font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--accent);padding:10px 0 6px;border-bottom:1px solid var(--border);margin-bottom:8px;}
</style>
</head>
<body>

<div id="loginScreen" class="screen active">
  <div class="login-box">
    <div class="logo">YOU<span>CAN</span></div>
    <p class="login-subtitle">Portal de notas</p>
    <div class="tab-bar">
      <button class="tab-btn active" onclick="setTab('student')">Alumno</button>
      <button class="tab-btn" onclick="setTab('register')">Registrarse</button>
      <button class="tab-btn" onclick="setTab('teacher')">Maestro</button>
    </div>

    <!-- LOGIN ALUMNO -->
    <div id="panelLogin">
      <div class="form-group"><label class="form-label">Usuario</label><input id="loginUser" class="form-input" type="text" placeholder="Tu usuario" autocomplete="username"></div>
      <div class="form-group"><label class="form-label">Contraseña</label><input id="loginPass" class="form-input" type="password" placeholder="••••••••" autocomplete="current-password"></div>
      <button class="btn btn-primary" id="loginBtn" onclick="doLogin()">Entrar →</button>
      <div id="loginError" class="error-msg"></div>
    </div>

    <!-- REGISTRO CON CÓDIGO -->
    <div id="panelRegister" style="display:none;">
      <div class="info-box" style="font-size:13px;margin-bottom:20px;">Ingresa el código que te dio tu maestro para crear tu cuenta.</div>
      <div class="form-group"><label class="form-label">Código de acceso</label><input id="regCode" class="form-input" type="text" placeholder="Ej: AHXTHV" style="text-transform:uppercase;letter-spacing:2px;"></div>
      <div class="form-group"><label class="form-label">Elige tu nombre de usuario</label><input id="regUser" class="form-input" type="text" placeholder="Ej: danna23"></div>
      <div class="form-group"><label class="form-label">Elige tu contraseña</label><input id="regPass" class="form-input" type="password" placeholder="Mínimo 4 caracteres"></div>
      <button class="btn btn-primary" id="regBtn" onclick="doRegister()">Crear cuenta →</button>
      <div id="regError" class="error-msg"></div>
    </div>

    <!-- LOGIN MAESTRO -->
    <div id="panelTeacher" style="display:none;">
      <div class="form-group"><label class="form-label">Usuario</label><input id="tUser" class="form-input" type="text" placeholder="maestro" autocomplete="username"></div>
      <div class="form-group"><label class="form-label">Contraseña</label><input id="tPass" class="form-input" type="password" placeholder="••••••••" autocomplete="current-password"></div>
      <button class="btn btn-primary" id="tBtn" onclick="doTeacherLogin()">Entrar →</button>
      <div id="tError" class="error-msg"></div>
    </div>
  </div>
</div>

<div id="appScreen" class="screen">
  <nav class="topbar">
    <div class="topbar-logo">YOU<span>CAN</span></div>
    <div class="topbar-right">
      <div class="user-chip">
        <div class="user-avatar-sm" id="topbarAvatar"></div>
        <span class="user-name-sm" id="topbarName"></span>
      </div>
      <button class="logout-btn" onclick="doLogout()">Salir</button>
    </div>
  </nav>
  <div class="main-content" id="mainContent"></div>
</div>

<div class="modal-overlay" id="avatarModal">
  <div class="modal">
    <div class="modal-title">Choose your avatar 🎨</div>
    <div class="emoji-grid" id="emojiGrid"></div>
    <div style="display:flex;gap:12px;">
      <button class="btn btn-primary" onclick="saveAvatar()">Save</button>
      <button class="btn btn-secondary" onclick="closeAvatarModal()">Cancel</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
const API = '';
let authToken = localStorage.getItem('yc_token') || null;
let currentUser = null;
let loginRole = 'student';

window.addEventListener('load', () => {
  if (authToken) {
    const saved = localStorage.getItem('yc_user');
    if (saved) { currentUser = JSON.parse(saved); goApp(); return; }
  }
  document.getElementById('loginScreen').classList.add('active');
});

function setTab(role) {
  loginRole = role;
  document.querySelectorAll('.tab-btn').forEach((b,i) => b.classList.toggle('active',
    (role==='student'&&i===0)||(role==='register'&&i===1)||(role==='teacher'&&i===2)));
  document.getElementById('panelLogin').style.display    = role==='student'  ? 'block' : 'none';
  document.getElementById('panelRegister').style.display = role==='register' ? 'block' : 'none';
  document.getElementById('panelTeacher').style.display  = role==='teacher'  ? 'block' : 'none';
  ['loginError','regError','tError'].forEach(id => { const el=document.getElementById(id); if(el) el.textContent=''; });
}

async function doLogin() {
  const username = document.getElementById('loginUser').value.trim();
  const password = document.getElementById('loginPass').value;
  const err = document.getElementById('loginError');
  const btn = document.getElementById('loginBtn');
  if (!username||!password) { err.textContent='Completa todos los campos'; return; }
  btn.disabled=true; btn.innerHTML='<span class="spinner"></span> Entrando...'; err.textContent='';
  try {
    const data = await api('POST','/api/login',{username,password,role:'student'});
    authToken=data.token; currentUser={role:'student',displayName:data.displayName,avatar:data.avatar,username,nivel:data.nivel};
    localStorage.setItem('yc_token',authToken); localStorage.setItem('yc_user',JSON.stringify(currentUser));
    goApp();
  } catch(e) { err.textContent=e.message; }
  finally { btn.disabled=false; btn.innerHTML='Entrar →'; }
}

async function doRegister() {
  const code = document.getElementById('regCode').value.trim().toUpperCase();
  const username = document.getElementById('regUser').value.trim();
  const password = document.getElementById('regPass').value;
  const err = document.getElementById('regError');
  const btn = document.getElementById('regBtn');
  if (!code||!username||!password) { err.textContent='Completa todos los campos'; return; }
  btn.disabled=true; btn.innerHTML='<span class="spinner"></span> Creando cuenta...'; err.textContent='';
  try {
    const data = await api('POST','/api/register',{code,username,password});
    authToken=data.token; currentUser={role:'student',displayName:data.displayName,avatar:data.avatar,username,nivel:data.nivel};
    localStorage.setItem('yc_token',authToken); localStorage.setItem('yc_user',JSON.stringify(currentUser));
    goApp();
  } catch(e) { err.textContent=e.message; }
  finally { btn.disabled=false; btn.innerHTML='Crear cuenta →'; }
}

async function doTeacherLogin() {
  const username = document.getElementById('tUser').value.trim();
  const password = document.getElementById('tPass').value;
  const err = document.getElementById('tError');
  const btn = document.getElementById('tBtn');
  if (!username||!password) { err.textContent='Completa todos los campos'; return; }
  btn.disabled=true; btn.innerHTML='<span class="spinner"></span> Entrando...'; err.textContent='';
  try {
    const data = await api('POST','/api/login',{username,password,role:'teacher'});
    authToken=data.token; currentUser={role:'teacher',displayName:data.displayName,avatar:data.avatar,username};
    localStorage.setItem('yc_token',authToken); localStorage.setItem('yc_user',JSON.stringify(currentUser));
    goApp();
  } catch(e) { err.textContent=e.message; }
  finally { btn.disabled=false; btn.innerHTML='Entrar →'; }
}

document.addEventListener('keydown', e => {
  if (e.key==='Enter' && document.getElementById('loginScreen').classList.contains('active')) {
    if (loginRole==='student') doLogin();
    else if (loginRole==='register') doRegister();
    else doTeacherLogin();
  }
});

function goApp() {
  document.getElementById('loginScreen').classList.remove('active');
  document.getElementById('appScreen').classList.add('active');
  document.getElementById('topbarAvatar').textContent = currentUser.avatar;
  document.getElementById('topbarName').textContent   = currentUser.username || currentUser.displayName;
  currentUser.role==='teacher' ? renderTeacher() : renderStudent();
}

function doLogout() {
  authToken=null; currentUser=null;
  localStorage.removeItem('yc_token'); localStorage.removeItem('yc_user');
  document.getElementById('appScreen').classList.remove('active');
  document.getElementById('loginScreen').classList.add('active');
  ['loginUser','loginPass','regCode','regUser','regPass','tUser','tPass'].forEach(id => {
    const el=document.getElementById(id); if(el) el.value='';
  });
}

async function api(method, path, body, isFile=false) {
  const opts = { method, headers: { Authorization: authToken ? `Bearer ${authToken}` : '' } };
  if (isFile) { opts.body=body; }
  else if (body) { opts.headers['Content-Type']='application/json'; opts.body=JSON.stringify(body); }
  const res  = await fetch(API+path, opts);
  const data = await res.json();
  if (!res.ok) throw new Error(data.error||'Error del servidor');
  return data;
}

// ════════ TEACHER ════════
let teacherTab = 'datos';
function renderTeacher() {
  document.getElementById('mainContent').innerHTML = `
    <div class="section-header">
      <div><div class="section-title">Panel del Maestro</div><div class="section-subtitle">Gestiona notas, alumnos y códigos</div></div>
    </div>
    <div class="app-tabs">
      <button class="app-tab ${teacherTab==='datos'?'active':''}"      onclick="switchT('datos')">📊 Notas</button>
      <button class="app-tab ${teacherTab==='alumnos'?'active':''}"    onclick="switchT('alumnos')">👥 Alumnos</button>
      <button class="app-tab ${teacherTab==='codigos'?'active':''}"    onclick="switchT('codigos')">🔑 Códigos</button>
      <button class="app-tab ${teacherTab==='actualizar'?'active':''}" onclick="switchT('actualizar')">🔄 Actualizar</button>
      <button class="app-tab ${teacherTab==='config'?'active':''}"     onclick="switchT('config')">⚙️ Config</button>
    </div>
    <div id="tContent"><div class="empty-state"><span class="spinner"></span></div></div>`;
  loadTeacherTab();
}
function switchT(t) { teacherTab=t; renderTeacher(); }
async function loadTeacherTab() {
  const c = document.getElementById('tContent');
  try {
    if (teacherTab==='datos')       await renderTDatos(c);
    else if (teacherTab==='alumnos')    await renderTAlumnos(c);
    else if (teacherTab==='codigos')    await renderTCodigos(c);
    else if (teacherTab==='actualizar') renderTActualizar(c);
    else                                renderTConfig(c);
  } catch(e) { c.innerHTML=`<div class="warn-box">⚠️ Error: ${e.message}</div>`; }
}

async function renderTDatos(c) {
  const rows = await api('GET','/api/teacher/sheet');
  const byNivel = {};
  rows.forEach(r => { if(!byNivel[r.nivel]) byNivel[r.nivel]=[]; byNivel[r.nivel].push(r); });
  let tableRows = '';
  Object.entries(byNivel).forEach(([nivel, rs]) => {
    tableRows += `<tr><td colspan="5" style="padding:14px 14px 6px;"><span class="data-badge">${nivel||'Sin nivel'}</span></td></tr>`;
    rs.forEach(r => { tableRows += `<tr><td><strong>${r.name}</strong></td><td>${pill(r.k1)}</td><td>${pill(r.k2)}</td><td>${pill(r.k3)}</td><td>${pill(r.final,true)}</td></tr>`; });
  });
  c.innerHTML = `<div class="card">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:12px;">
      <div><div class="card-title">Notas de Marzo</div><div class="card-subtitle">Solo se muestra K1 — K2 y K3 pendientes</div></div>
      <span class="data-badge">✓ ${rows.length} alumnos</span>
    </div>
    <div class="table-wrap"><table><thead><tr><th>Alumno</th><th>K1</th><th>K2</th><th>K3</th><th>% Final</th></tr></thead><tbody>${tableRows}</tbody></table></div>
  </div>`;
}

async function renderTAlumnos(c) {
  const students = await api('GET','/api/teacher/students');
  const byNivel = {};
  students.forEach(s => { const n=s.nivel||'Sin nivel'; if(!byNivel[n]) byNivel[n]=[]; byNivel[n].push(s); });
  let list = '';
  Object.entries(byNivel).forEach(([nivel, ss]) => {
    list += `<div class="nivel-group-header">${nivel} (${ss.length})</div>`;
    ss.forEach(s => { list += `
      <div class="student-row" id="sr-${s.id}">
        <div class="student-row-left">
          <div class="ava-xs">${s.avatar}</div>
          <div>
            <div style="font-weight:500;font-size:14px;">${s.display_name}</div>
            <div style="color:var(--muted);font-size:12px;">@${s.username}</div>
          </div>
        </div>
        <div style="display:flex;gap:8px;align-items:center;">
          <button class="btn btn-sm btn-secondary" onclick="resetPassword(${s.id},'${s.display_name}')">Reset pwd</button>
          <button class="btn btn-sm" style="background:rgba(248,113,113,0.1);color:var(--danger);border:none;" onclick="removeStudent(${s.id})">✕</button>
        </div>
      </div>`; });
  });
  c.innerHTML = `<div class="card">
    <div class="card-title" style="margin-bottom:4px;">Alumnos registrados</div>
    <div class="card-subtitle">${students.length} con acceso activo · Puedes resetear contraseñas desde aquí</div>
    ${students.length===0 ? '<div class="empty-state"><div class="empty-icon">👤</div>Nadie se ha registrado aún</div>' : list}
  </div>`;
}

async function resetPassword(id, name) {
  const newPass = prompt(`Nueva contraseña para ${name}:`);
  if (!newPass) return;
  try {
    await api('PATCH',`/api/teacher/students/${id}/reset`,{password:newPass});
    showToast(`✓ Contraseña de ${name} actualizada`);
  } catch(e) { showToast(e.message,true); }
}

async function removeStudent(id) {
  if (!confirm('¿Eliminar este alumno?')) return;
  await api('DELETE',`/api/teacher/students/${id}`);
  document.getElementById(`sr-${id}`)?.remove();
  showToast('Alumno eliminado');
}

async function renderTCodigos(c) {
  const codes = await api('GET','/api/teacher/codes');
  const byNivel = {};
  codes.forEach(r => { const n=r.nivel||'Sin nivel'; if(!byNivel[n]) byNivel[n]=[]; byNivel[n].push(r); });
  let rows = '';
  Object.entries(byNivel).forEach(([nivel, cs]) => {
    rows += `<tr><td colspan="3" style="padding:14px 14px 6px;"><span class="data-badge">${nivel}</span></td></tr>`;
    cs.forEach(r => { rows += `<tr>
      <td>${r.name}</td>
      <td><span class="code-chip">${r.code}</span></td>
      <td>${r.used ? '<span class="pill pill-high">✓ Registrado</span>' : '<span class="pill pill-none">Pendiente</span>'}</td>
    </tr>`; });
  });
  c.innerHTML = `<div class="card">
    <div class="card-title" style="margin-bottom:4px;">Códigos de registro</div>
    <div class="card-subtitle">Comparte el código con cada alumno para que pueda crear su cuenta</div>
    <div class="table-wrap"><table>
      <thead><tr><th>Alumno</th><th>Código</th><th>Estado</th></tr></thead>
      <tbody>${rows}</tbody>
    </table></div>
  </div>`;
}

function renderTActualizar(c) {
  c.innerHTML = `
    <div class="info-box">💡 Sube tu Excel actualizado y todos los alumnos verán sus nuevas notas de inmediato desde cualquier dispositivo.</div>
    <div class="card">
      <div class="card-title">Subir Excel actualizado</div>
      <div class="card-subtitle">Misma estructura: Col A=NIVEL, B=ALUMNOS, C=K1, D=K2, E=K3</div>
      <div class="upload-zone" id="uploadZone" onclick="document.getElementById('fileInput').click()">
        <div class="upload-icon">📂</div>
        <div class="upload-text"><strong>Haz clic o arrastra</strong> tu archivo Excel aquí<br><span style="font-size:12px;margin-top:4px;display:block;">.xlsx · .xls</span></div>
      </div>
      <input type="file" id="fileInput" accept=".xlsx,.xls">
      <div id="uploadStatus" style="margin-top:14px;font-size:14px;color:var(--muted);min-height:20px;font-family:'DM Sans',sans-serif;"></div>
    </div>`;
  bindUpload();
}

function bindUpload() {
  const fi=document.getElementById('fileInput'); const uz=document.getElementById('uploadZone');
  if(!fi) return;
  fi.onchange = e => { if(e.target.files[0]) uploadFile(e.target.files[0]); };
  uz.ondragover = e => { e.preventDefault(); uz.classList.add('over'); };
  uz.ondragleave = () => uz.classList.remove('over');
  uz.ondrop = e => { e.preventDefault(); uz.classList.remove('over'); if(e.dataTransfer.files[0]) uploadFile(e.dataTransfer.files[0]); };
}

async function uploadFile(file) {
  const status=document.getElementById('uploadStatus');
  status.innerHTML='<span class="spinner"></span> Subiendo...';
  const fd=new FormData(); fd.append('file',file);
  try {
    const data=await api('POST','/api/teacher/sheet/upload',fd,true);
    status.innerHTML=`<span style="color:var(--success)">✓ ${data.count} alumnos actualizados.</span>`;
    showToast(`✓ ${data.count} alumnos actualizados`);
  } catch(e) { status.innerHTML=`<span style="color:var(--danger)">⚠️ ${e.message}</span>`; }
}

function renderTConfig(c) {
  c.innerHTML = `<div class="card" style="max-width:480px;">
    <div class="card-title">Cuenta del Maestro</div>
    <div class="card-subtitle" style="font-family:'DM Sans',sans-serif;text-transform:none;">Cambia tus credenciales de acceso</div>
    <div class="form-group"><label class="form-label">Nombre a mostrar</label><input id="cfgName" class="form-input" value="${currentUser.displayName}"></div>
    <div class="form-group"><label class="form-label">Usuario</label><input id="cfgUser" class="form-input" value="${currentUser.username}"></div>
    <div class="form-group"><label class="form-label">Nueva contraseña (vacío = no cambiar)</label><input id="cfgPass" class="form-input" type="password" placeholder="••••••••"></div>
    <button class="btn btn-primary" onclick="saveCfg()">Guardar cambios</button>
    <div id="cfgMsg" style="margin-top:10px;font-size:13px;min-height:18px;font-family:'DM Sans',sans-serif;"></div>
  </div>`;
}

async function saveCfg() {
  const displayName=document.getElementById('cfgName').value.trim();
  const username=document.getElementById('cfgUser').value.trim();
  const password=document.getElementById('cfgPass').value;
  const msg=document.getElementById('cfgMsg');
  if(!displayName||!username){msg.style.color='var(--danger)';msg.textContent='Nombre y usuario requeridos';return;}
  try {
    await api('PATCH','/api/teacher/config',{displayName,username,password});
    currentUser.displayName=displayName; currentUser.username=username;
    localStorage.setItem('yc_user',JSON.stringify(currentUser));
    document.getElementById('topbarName').textContent=username;
    msg.style.color='var(--success)'; msg.textContent='✓ Guardado';
    showToast('Configuración guardada');
  } catch(e){msg.style.color='var(--danger)';msg.textContent=e.message;}
}

// ════════ STUDENT ════════
async function renderStudent() {
  const mc=document.getElementById('mainContent');
  mc.innerHTML='<div style="text-align:center;padding:80px;color:var(--muted);"><span class="spinner"></span> Loading...</div>';
  try {
    const d=await api('GET','/api/me/scores');
    const k1=d?.k1??null, k2=d?.k2??null, k3=d?.k3??null, final=d?.final??null;
    mc.innerHTML = `
      <div class="student-hero">
        <div class="student-avatar-big" onclick="openAvatarModal()" title="Change avatar">
          ${currentUser.avatar}
          <div class="avatar-edit-hint">✏️</div>
        </div>
        <div class="student-info">
          <h2>${currentUser.username}</h2>
          <p>${currentUser.displayName}</p>
          ${currentUser.nivel ? `<div class="nivel-badge">${currentUser.nivel}</div>` : ''}
        </div>
      </div>

      <div class="final-score-display">
        <div class="label">Final Score — March</div>
        <div class="value">${final!==null?final+'%':'—'}</div>
        <div class="sub">${final!==null?motivation(final):'No scores recorded yet'}</div>
      </div>

      <div class="kahoot-grid">
        ${kCard('Kahoot Week 1',k1,'k1')}
        ${kCard('Kahoot Week 2',k2,'k2')}
        ${kCard('Kahoot Week 3',k3,'k3')}
      </div>

      <div class="card">
        <div class="card-title">Progress</div>
        <div class="card-subtitle" style="font-family:'DM Sans',sans-serif;text-transform:none;">Your performance this month</div>
        ${[['Week 1',k1,'k1'],['Week 2',k2,'k2'],['Week 3',k3,'k3'],['Total',final,'total']].map(([l,v,cls])=>`
          <div class="bar-row">
            <div class="bar-label">${l}</div>
            <div class="progress-bar-wrap"><div class="progress-bar ${cls}" style="width:${v??0}%"></div></div>
            <div class="bar-val">${v!==null?v+'%':'—'}</div>
          </div>`).join('')}
      </div>
      ${!d?'<div class="warn-box">⚠️ No scores found for your account. Contact your teacher.</div>':''}`;
  } catch(e) { mc.innerHTML=`<div class="warn-box">⚠️ Error loading scores: ${e.message}</div>`; }
}

function kCard(label,val,cls) {
  return `<div class="kahoot-card ${cls}">
    <div class="kahoot-label">${label}</div>
    ${val!==null?`<div class="kahoot-score-big">${val}</div><div class="kahoot-sub">out of 100</div>`:`<div class="no-data-big">—</div><div class="kahoot-sub">Pending</div>`}
  </div>`;
}

function motivation(p) {
  if (p>=90) return "You\'re doing it amazing! 🚀";
  if (p>=70) return "Very Good job! 🥳";
  if (p>=60) return "Good job ✅";
  return "Keep going 💪🏻";
}

function pill(v,pct=false) {
  if(v===null||v===undefined) return '<span class="pill pill-none">—</span>';
  const c=v>=80?'pill-high':v>=50?'pill-mid':'pill-low';
  return `<span class="pill ${c}">${v}${pct?'%':''}</span>`;
}

// ════════ AVATAR ════════
const AVATARS=['🐱','🐶','🦊','🐼','🐨','🦁','🐯','🐸','🦄','🐲','🦋','🐧','🦜','🐢','🦈','🐙','🌟','⚡','🔥','🌈','🍀','💎','🎮','🎸','🚀','🎯','🏆','👾','🎃','🤖'];
let selAvatar=null;
function openAvatarModal() {
  selAvatar=currentUser.avatar||'🐱';
  document.getElementById('emojiGrid').innerHTML=AVATARS.map(e=>`<button class="emoji-btn ${e===selAvatar?'selected':''}" onclick="pickEmoji('${e}')">${e}</button>`).join('');
  document.getElementById('avatarModal').classList.add('open');
}
function pickEmoji(e){selAvatar=e;document.querySelectorAll('.emoji-btn').forEach(b=>b.classList.toggle('selected',b.textContent===e));}
function closeAvatarModal(){document.getElementById('avatarModal').classList.remove('open');}
async function saveAvatar(){
  if(!selAvatar) return;
  await api('PATCH','/api/me/avatar',{avatar:selAvatar});
  currentUser.avatar=selAvatar; localStorage.setItem('yc_user',JSON.stringify(currentUser));
  document.getElementById('topbarAvatar').textContent=selAvatar;
  closeAvatarModal(); showToast('Avatar updated!');
  if(currentUser.role==='student') renderStudent();
}
document.getElementById('avatarModal').addEventListener('click',e=>{if(e.target===document.getElementById('avatarModal'))closeAvatarModal();});

// ════════ TOAST ════════
function showToast(msg,isErr=false){
  const t=document.getElementById('toast');
  t.textContent=msg; t.className=isErr?'err':''; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),3200);
}
</script>
